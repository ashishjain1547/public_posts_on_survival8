<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fall down 7 times, Get up 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html { width: 100%; height: 100%; overflow: hidden; }

  .cover {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cover-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .overlay {
    position: relative;
    z-index: 2;
    text-align: center;
    color: #ffffff;
    font-family: 'Raleway', sans-serif;
    padding: 2rem;
    max-width: 90%;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
  }

  .overlay .quote {
    font-size: clamp(1.8rem, 5vw, 4.2rem);
    font-weight: 700;
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  .overlay .attribution {
    margin-top: 1.2em;
    font-size: clamp(0.8rem, 2vw, 1.6rem);
    font-weight: 200;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .watermark {
    position: absolute;
    bottom: 2.5%;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 3;
    font-family: 'Raleway', sans-serif;
    font-size: clamp(0.8rem, 1.5vw, 1.1rem);
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  .cover::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="cover">
  <img class="cover-image" src="img.png" alt="Fall down 7 times, Get up 8">
  <div class="overlay">
    <div class="quote">
      Fall down 7 times...<br>Get up 8
    </div>
    <div class="attribution">— Japanese Proverb</div>
  </div>
  <div class="watermark">survival8.blogspot.com</div>
</div>
</body>
</html>
